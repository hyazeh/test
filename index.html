<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Terminal Portfolio</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            padding: 20px;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #terminal {
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background-color: #00ff00;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

<div id="terminal"></div>
<span class="cursor"></span>

<script>
    const text = `> INITIALIZING SYSTEM...
> LOADING CORE MODULES... [DONE]
> USER: hyazeh (Krystian)
> SKILLS: [PC_BUILDING, WINDOWS_DIAGNOSTICS, HARDWARE_ASSEMBLY]
> STATUS: READY FOR INTERNSHIP
> 
> "Z pasją buduję komputery i rozwiązuję problemy sprzętowe. 
> Ten terminal to mój mały projekt w HTML/JS."
> 
> KONTAKT: [TWÓJ MAIL / LINK DO CV]`;

    const terminal = document.getElementById('terminal');
    let i = 0;

    function typeWriter() {
        if (i < text.length) {
            terminal.innerHTML += text.charAt(i);
            i++;
            
            window.scrollTo(0, document.body.scrollHeight);
            setTimeout(typeWriter, 40);
        }
    }

   
    window.onload = typeWriter;
</script>

</body>
</html>
